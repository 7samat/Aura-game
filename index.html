<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Aura</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
    }
    #game {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      position: fixed;
      top: 0;
      left: 0;
      /* Keep game inside safe area on notched phones */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    // Ensure canvas gets keyboard focus
    window.addEventListener('load', () => {
      const canvas = document.querySelector('canvas');
      if (canvas) { canvas.focus(); canvas.tabIndex = 0; }
    });
    // Focus canvas on any click
    document.addEventListener('click', () => {
      const canvas = document.querySelector('canvas');
      if (canvas) canvas.focus();
    });

    // Request fullscreen once on first mobile tap
    function tryFullscreen() {
      if ('ontouchstart' in window && !document.fullscreenElement && document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
      document.removeEventListener('click', tryFullscreen);
    }
    document.addEventListener('click', tryFullscreen);
  </script>
</body>
</html>
